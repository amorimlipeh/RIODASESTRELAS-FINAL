
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RIO DAS ESTRELAS - SISTEMA</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#071a36;
  color:#fff;
}

header{
  padding:15px;
  background:#0b2545;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

button{
  padding:10px 15px;
  border:none;
  border-radius:8px;
  background:#3b73e6;
  color:#fff;
}

.container{
  padding:20px;
}

.card{
  background:#0b2545;
  padding:20px;
  border-radius:12px;
  margin-bottom:15px;
}
</style>

</head>
<body>

<header>
  <h2>🌟 RIO DAS ESTRELAS</h2>
  <button onclick="logout()">Sair</button>
</header>

<div class="container">

<div class="card">
  <h3>📦 Módulos</h3>
  <button onclick="ir('/produtos')">Produtos</button>
  <button onclick="ir('/estoque')">Estoque</button>
  <button onclick="ir('/wms')">Mapa WMS</button>
  <button onclick="ir('/pedidos')">Pedidos</button>
</div>

<div class="card">
  <h3>📊 Status</h3>
  <div id="user"></div>
</div>

</div>

<script>
const token = localStorage.getItem("rio_token");

if(!token){
  window.location.href = "/login";
}

const usuario = JSON.parse(localStorage.getItem("usuario") || "{}");
document.getElementById("user").innerText = JSON.stringify(usuario, null, 2);

function logout(){
  localStorage.removeItem("rio_token");
  localStorage.removeItem("usuario");
  window.location.href = "/login";
}

function ir(url){
  alert("Módulo ainda será integrado: " + url);
}
</script>

</body>
</html>
