<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema Integrado</title>
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>

<header class="topbar">
  <h2>🚀 SISTEMA INTEGRADO</h2>
  <div class="top-actions">
    <button class="small" id="btnTrocarEmpresa" type="button">Trocar empresa</button>
    <button class="small" id="btnSair" type="button">Sair</button>
  </div>
</header>

<div class="container">
  <div class="empresa-box">
    <b>Empresa atual:</b> <span id="empresaAtual"></span>
  </div>

  <hr>

  <h3>📦 Estoque</h3>
  <input id="produto" placeholder="Produto">
  <input id="qtd" placeholder="Quantidade">
  <button id="btnAdicionar" type="button">Adicionar</button>

  <ul id="lista"></ul>
</div>

<script src="/js/app.js"></script>
</body>
</html>
