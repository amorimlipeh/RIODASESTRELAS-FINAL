<!DOCTYPE html>
<html>
<body>

<h1>COBRANÇA AUTOMÁTICA</h1>

<button onclick="load()">Ver clientes</button>

<pre id="out"></pre>

<script>
async function load(){
 const r = await fetch("/api/clientes");
 const d = await r.json();
 document.getElementById("out").innerText = JSON.stringify(d,null,2);
}
</script>

</body>
</html>
