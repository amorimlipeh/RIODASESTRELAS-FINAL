
<html>
<body>
<h1>COBRANÇA</h1>

<input id="empresa" placeholder="empresa">
<input id="dias" placeholder="dias">
<button onclick="pagar()">Pagar</button>

<div id="status"></div>

<script>
async function pagar(){
 await fetch("/api/pagar",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({
   empresa:empresa.value,
   dias:dias.value
  })
 });
 status();
}

async function status(){
 const r=await fetch("/api/status/"+empresa.value);
 const d=await r.json();
 document.getElementById("status").innerText=JSON.stringify(d.empresa);
}
</script>

</body>
</html>
