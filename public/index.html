
<html>
<body>
<h1>SISTEMA MODULAR</h1>

<h2>Testar módulos</h2>
<button onclick="test('estoque')">Estoque</button>
<button onclick="test('dashboard')">Dashboard</button>
<button onclick="test('picking')">Picking</button>

<h2>Configurar módulos</h2>
<input id="mods" placeholder="estoque,dashboard">
<button onclick="save()">Salvar</button>

<pre id="out"></pre>

<script>
async function test(m){
 const r=await fetch("/api/"+m);
 const d=await r.json();
 out.innerText=JSON.stringify(d,null,2);
}

async function save(){
 const mod=document.getElementById("mods").value.split(",");
 await fetch("/api/dev/modulos",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({empresa:"EMPRESA_TESTE",modulos:mod})
 });
 alert("salvo");
}
</script>

</body>
</html>
