<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sistema</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="container">
  <h1>🚀 SISTEMA INTEGRADO</h1>
  <p>Empresa: <span id="emp"></span></p>

  <div class="menu">
    <button onclick="mostrar('estoque')">📦 Estoque</button>
    <button onclick="mostrar('wms')">📍 WMS</button>
    <button onclick="mostrar('mapa')">🗺️ Mapa</button>
  </div>

  <div id="estoque" class="modulo">
    <h2>Estoque</h2>
    <input id="produto" placeholder="Produto">
    <input id="qtd" placeholder="Qtd">
    <button onclick="add()">Adicionar</button>
    <ul id="lista"></ul>
  </div>

  <div id="wms" class="modulo hidden">
    <h2>WMS</h2>
    <input id="endereco" placeholder="05-001-3-1">
    <button onclick="addEndereco()">Adicionar</button>
    <ul id="wms_lista"></ul>
  </div>

  <div id="mapa" class="modulo hidden">
    <h2>Mapa WMS</h2>
    <div id="grid"></div>
  </div>
</div>

<script src="/js/app.js"></script>

</body>
</html>
