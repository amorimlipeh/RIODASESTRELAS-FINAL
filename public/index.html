
<html>
<body>
<h1>AUTOMAÇÃO TOTAL</h1>

<button onclick="run()">Executar IA</button>

<div id="out"></div>

<script>
async function run(){
 const r=await fetch("/api/auto");
 const d=await r.json();

 document.getElementById("out").innerHTML=
  "Próximo pedido: "+d.proximo.id+
  "<br>Fila: "+JSON.stringify(d.fila);
}
</script>

</body>
</html>
